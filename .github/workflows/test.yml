name: test

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
      - run: python3 -m pip install pytest -r requirements.txt
      - run: npm run plugin:verify
      - run: npm run plugin:verify-specs
      - run: python3 -m pytest tests/test_harness_cli.py
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: SMOKE_SERVER_COMMAND=start npm run test:smoke
